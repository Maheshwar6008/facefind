# facefind.maheshwar.tech — Nginx Configuration
# Copy to: /etc/nginx/sites-available/facefind

server {
    listen 80;
    server_name facefind.maheshwar.tech;

    # Redirect HTTP to HTTPS (after certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name facefind.maheshwar.tech;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/facefind.maheshwar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facefind.maheshwar.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Max upload size (for selfie uploads)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend — serve built static files
    location / {
        root /var/www/facefind/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API — proxy to FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long-running face processing
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
